model:
  name: "google/mt5-small"
  max_input_length: 128
  max_target_length: 256

training:
  batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 3e-4
  num_epochs: 3
  warmup_steps: 100
  weight_decay: 0.01
  fp16: true
  seed: 42

peft:
  use_lora: true
  r: 16
  lora_alpha: 32
  lora_dropout: 0.1
  target_modules: ["q", "v"]

data:
  train_path: "Train.csv"
  val_path: "Val.csv"
  test_path: "Test.csv"
  prompt_template: "answer health question in {lang}: {question}"

inference:
  num_beams: 4
  max_new_tokens: 256
  no_repeat_ngram_size: 3
